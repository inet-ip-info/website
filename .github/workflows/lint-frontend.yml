name: Lint frontend

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/lint-frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/lint-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-linters:
    name: Run linters
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node.js dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run Prettier
        run: npm run lint
        working-directory: ./frontend

      - name: Type check
        run: npm run check
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
